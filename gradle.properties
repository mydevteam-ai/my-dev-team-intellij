# The IntelliJ Platform Gradle Plugin needs a fair amount of memory to index
# the platform distribution during the first build.
org.gradle.jvmargs=-Xmx2g
# The IDE ships its own Kotlin stdlib; modules that need one at compile time
# (core) declare it explicitly, so the plugin zip never bundles a second copy.
kotlin.stdlib.default.dependency=false
# Where the built engine bundle (dist/sidecar-stdio.js) is copied from when
# packaging the plugin. Override with -PsidecarDist=<path> or edit here; the
# default assumes the sibling VS Code repo checkout.
sidecarDist=../my-dev-team-vs-code/dist/sidecar-stdio.js
