<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    color-scheme: light dark;
    --bg: light-dark(#ffffff, #1e1f22);
    --fg: light-dark(#1f2328, #dfe1e5);
    --muted: light-dark(#6b7280, #9aa0a6);
    --card: light-dark(#f6f8fa, #2b2d30);
    --border: light-dark(#d1d9e0, #43454a);
    --accent: light-dark(#0969da, #6ea8fe);
    --err: light-dark(#b42318, #ff7b72);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 system-ui, "Segoe UI", sans-serif;
  }
  #transcript { flex: 1; overflow-y: auto; padding: 10px; }
  .msg { margin: 0 0 10px; }
  .user {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; white-space: pre-wrap;
  }
  .label { color: var(--muted); font-size: 11px; margin: 0 0 3px; }
  .answer { white-space: pre-wrap; }
  .meta { color: var(--muted); font-style: italic; }
  .error { color: var(--err); white-space: pre-wrap; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; margin: 6px 0;
    overflow-x: auto;
  }
  .tool { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
  .tool .result { color: var(--muted); }
  .plan-step { margin: 2px 0 2px 14px; }
  #status { color: var(--muted); font-size: 12px; padding: 2px 10px; min-height: 18px; font-style: italic; }
  #inputRow { display: flex; gap: 6px; padding: 8px 10px 10px; border-top: 1px solid var(--border); }
  #prompt {
    flex: 1; resize: none; min-height: 34px; max-height: 140px;
    background: var(--card); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px;
    font: inherit;
  }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 0 14px; font: inherit; cursor: pointer;
  }
  button.secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <div id="transcript"></div>
  <div id="status"></div>
  <div id="inputRow">
    <textarea id="prompt" placeholder="Describe what to build... (/clear resets the conversation)"></textarea>
    <button id="send">Send</button>
    <button id="stop" class="secondary" style="display:none">Stop</button>
  </div>

<script>
"use strict";

function postToIde(msg) {
  const json = JSON.stringify(msg);
  /*__POST_TO_IDE__*/
}

const transcript = document.getElementById("transcript");
const statusLine = document.getElementById("status");
const promptBox = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const stopBtn = document.getElementById("stop");

let run = null; // state of the run being rendered

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}

function scrollDown() { transcript.scrollTop = transcript.scrollHeight; }

function setBusy(busy) {
  sendBtn.disabled = busy;
  stopBtn.style.display = busy ? "" : "none";
  if (!busy) statusLine.textContent = "";
}

function beginRun() {
  run = { root: el("div", "msg"), answer: null, execCards: {}, planCard: null };
  transcript.appendChild(run.root);
  setBusy(true);
}

function ensureAnswer() {
  if (!run.answer) {
    run.answer = el("div", "answer");
    run.root.appendChild(run.answer);
  }
  return run.answer;
}

function renderExecutionEvent(index, ev) {
  let card = run.execCards[index];
  if (!card) {
    card = el("div", "card");
    run.execCards[index] = card;
    run.root.appendChild(card);
  }
  card.textContent = "";
  if (ev.kind === "text") {
    card.className = "msg answer";
    card.textContent = ev.text || "";
  } else if (ev.kind === "tool") {
    card.className = "card tool";
    card.appendChild(el("div", null, (ev.failed ? "x " : "> ") + ev.tool + " " + (ev.input || "")));
    if (ev.snippet) card.appendChild(el("div", "result", ev.snippet));
    if (ev.result) card.appendChild(el("div", "result", ev.result));
  } else if (ev.kind === "progress" && Array.isArray(ev.items)) {
    card.className = "card";
    for (const item of ev.items) {
      const mark = item.status === "done" ? "[x]" : item.status === "in_progress" ? "[~]" : "[ ]";
      card.appendChild(el("div", "plan-step", mark + " step " + item.step));
    }
  }
}

function renderPlan(plan) {
  if (!run.planCard) {
    run.planCard = el("div", "card");
    run.root.appendChild(run.planCard);
  }
  const card = run.planCard;
  card.textContent = "";
  card.appendChild(el("div", "label", "Plan"));
  if (plan.summary) card.appendChild(el("div", null, plan.summary));
  (plan.steps || []).forEach(function (step, i) {
    if (step && step.title) card.appendChild(el("div", "plan-step", (i + 1) + ". " + step.title));
  });
}

function onEvent(ev) {
  if (!run) return;
  switch (ev.type) {
    case "triaged":
      run.root.appendChild(el("div", "meta", "intent: " + ev.intent + " - " + (ev.reason || "")));
      break;
    case "model-selected": {
      const models = (ev.selection && ev.selection.models) || [];
      const line = models.map(function (m) { return m.step + ": " + m.label; }).join(", ");
      if (line) run.root.appendChild(el("div", "meta", line));
      break;
    }
    case "thinking":
      statusLine.textContent = ev.text || "";
      return; // ephemeral: no transcript node, no scroll
    case "answer-delta":
      ensureAnswer().textContent += ev.text || "";
      break;
    case "plan-snapshot":
      if (ev.plan) renderPlan(ev.plan);
      break;
    case "execution-event":
      renderExecutionEvent(ev.index, ev.event || {});
      break;
    case "summary-snapshot": {
      // Small and revised in place: rebuild the one summary card each time.
      if (!run.summaryCard) {
        run.summaryCard = el("div", "card");
        run.root.appendChild(run.summaryCard);
      }
      const s = ev.summary || {};
      run.summaryCard.textContent = "";
      run.summaryCard.appendChild(el("div", "label", "Summary"));
      if (s.whatShips) run.summaryCard.appendChild(el("div", null, s.whatShips));
      if (s.howItsBuilt) run.summaryCard.appendChild(el("div", null, s.howItsBuilt));
      if (s.testsAndDocs) run.summaryCard.appendChild(el("div", null, s.testsAndDocs));
      break;
    }
    case "context-warning":
      if (ev.warning) {
        run.root.appendChild(el("div", "meta",
          "context " + ev.warning.percent + "% of " + ev.warning.model));
      }
      break;
    case "error":
      run.root.appendChild(el("div", "error", ev.message + (ev.hint ? "\n" + ev.hint : "")));
      break;
    default:
      break; // usage, triage-shadow, unknown: nothing to render
  }
  scrollDown();
}

function onOutcome(msg) {
  if (run && !msg.ok && !msg.cancelled) {
    run.root.appendChild(el("div", "error", msg.message + (msg.hint ? "\n" + msg.hint : "")));
  }
  if (run && msg.cancelled) {
    run.root.appendChild(el("div", "meta", "cancelled"));
  }
  if (run && msg.ok && msg.reply && Array.isArray(msg.reply.questions)) {
    for (const q of msg.reply.questions) {
      const card = el("div", "card");
      card.appendChild(el("div", null, q.question));
      (q.options || []).forEach(function (opt, i) {
        card.appendChild(el("div", "plan-step", (i + 1) + ". " + opt));
      });
      run.root.appendChild(card);
    }
  }
  run = null;
  setBusy(false);
  scrollDown();
}

window.devteam = {
  receive: function (msg) {
    switch (msg.kind) {
      case "user": {
        const wrap = el("div", "msg");
        wrap.appendChild(el("div", "label", "You"));
        wrap.appendChild(el("div", "user", msg.text));
        transcript.appendChild(wrap);
        beginRun();
        break;
      }
      case "event": onEvent(msg.event || {}); break;
      case "outcome": onOutcome(msg); break;
      case "fatal": {
        const node = el("div", "error", msg.message);
        (run ? run.root : transcript).appendChild(node);
        run = null;
        setBusy(false);
        break;
      }
      case "cleared":
        transcript.appendChild(el("div", "meta msg", "conversation cleared"));
        break;
    }
    scrollDown();
  },
};

function submit() {
  const text = promptBox.value.trim();
  if (!text || sendBtn.disabled && text !== "/clear") return;
  promptBox.value = "";
  postToIde({ kind: "send", text: text });
}

sendBtn.addEventListener("click", submit);
stopBtn.addEventListener("click", function () { postToIde({ kind: "cancel" }); });
promptBox.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});

postToIde({ kind: "ready" });
</script>
</body>
</html>
